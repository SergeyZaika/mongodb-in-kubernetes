apiVersion: v1
kind: Service
metadata:
  name: mongodb-client
  namespace: dev
  labels:
    app.kubernetes.io/name: mongodb
spec:
  type: ClusterIP
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
---
apiVersion: v1
kind: Endpoints
metadata:
  name: mongodb-client
  namespace: dev
subsets:
  - addresses:
      - ip: 10.0.0.1
    ports:
      - port: 27017